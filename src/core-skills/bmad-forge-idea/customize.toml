# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for bmad-forge-idea.
#
# Override files (not edited here):
#   {project-root}/_bmad/custom/bmad-forge-idea.toml        (team)
#   {project-root}/_bmad/custom/bmad-forge-idea.user.toml   (personal)

[workflow]

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays: append

# Steps to run before the standard activation (config load, greet).
activation_steps_prepend = []

# Steps to run after greet but before the session begins.
activation_steps_append = []

# Persistent facts the interrogator keeps in mind for the whole session
# (domain constraints, house rules, what's off the table). Each entry is a
# literal sentence, a skill prefixed with `skill:`, or a `file:`-prefixed
# path/glob whose contents are loaded as facts. Default loads a project-context
# file when one exists, so the forge knows the domain without re-asking.
persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Executed when the session completes. Scalar or array of instructions. Empty for none.
on_complete = ""

# Session output location. The memlog and any distilled brief land inside
# `{forge_output_path}/{run_folder_pattern}/`. The resume check globs
# `{forge_output_path}/*/.memlog.md`. Lands directly under {output_folder} so the
# skill works in core-only installs.
forge_output_path = "{output_folder}/forge"

# Run-folder pattern inside forge_output_path. Resolved against the idea-derived
# slug at session start. Same slug = same folder, so returning to an idea resumes
# it in place. Override to add {date} if a fresh dated history is preferred.
run_folder_pattern = "{slug}"
