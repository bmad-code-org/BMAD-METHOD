# DO NOT EDIT -- overwritten on every update.
#
# Workflow customization surface for bmad-ignite.
#
# Override files (not edited here):
#   {project-root}/_bmad/custom/bmad-ignite.toml         (team)
#   {project-root}/_bmad/custom/bmad-ignite.user.toml    (personal)
#
# Merge rules:
# - Strings replace the default.
# - Lists append to the default list.
# - Tables merge key by key.
# - Arrays of tables merge by `id`: matching `id` replaces, new `id`s append.

[workflow]

# Steps to run before the standard activation (config load, greet).
activation_steps_prepend = []

# Steps to run after greet but before step 01.
activation_steps_append = []

# Persistent facts the workflow keeps in mind for the whole run.
# Each entry is a literal sentence, a `skill:`-prefixed skill to consult,
# or a `file:`-prefixed path/glob whose contents are loaded as facts.
persistent_facts = []

# Executed when the workflow completes (after handoff is presented).
# Accepts a string scalar (single instruction) or an array executed in order.
on_complete = ""

# --- Starter template registry -------------------------------------------
#
# Curated, opinionated starters. Each entry drives step 02 (selection),
# step 03 (scaffold), and step 04 (verification). Teams extend or replace
# entries in the override TOMLs: a [[workflow.templates]] block with a
# matching `id` replaces the default; a new `id` appends to the menu.
#
# Fields:
#   id           unique key (merge identity)
#   label        menu display name
#   stack        one-line stack summary shown in the proposal
#   best_for     what intents this fits — step 02 matches against this
#   requires     tools that must be on PATH before scaffolding
#   scaffold     command run verbatim with {target} as the staging directory
#   env          where credentials come from (guidance for the user, with links)
#   notes        one-time bootstrap steps after scaffolding (may be empty)
#   verify_build build command; empty string skips the check
#   verify_dev   dev-server command; empty string skips the boot check
#   verify_url   URL probed while verify_dev runs

[[workflow.templates]]
id = "nextjs-supabase"
label = "Next.js + Supabase"
stack = "Next.js App Router, TypeScript, Tailwind, shadcn/ui, Supabase (Postgres, auth, storage)"
best_for = "Full-stack web apps that need auth and a managed database"
requires = ["node", "npx", "git"]
scaffold = "npx --yes create-next-app@latest {target} --example with-supabase"
env = "Create a free project at https://database.new, then copy the project URL and publishable key from the Supabase dashboard (Settings > API) into the env file the template documents."
notes = [
  "Static pages render without Supabase credentials; auth flows need the env file filled in first.",
]
verify_build = "npm run build"
verify_dev = "npm run dev"
verify_url = "http://localhost:3000"

[[workflow.templates]]
id = "t3-stack"
label = "T3 Stack (Next.js + Postgres, self-hosted)"
stack = "Next.js App Router, TypeScript, tRPC, Tailwind, Drizzle ORM against your own Postgres"
best_for = "Typesafe full-stack web apps without a managed BaaS — you own the database"
requires = ["node", "npm", "git"]
scaffold = "npm create t3-app@latest {target} -- --CI --appRouter --trpc --tailwind --drizzle --dbProvider postgres"
env = "Point DATABASE_URL in .env at a local or hosted Postgres instance, then push the schema with the db script the template README documents."
notes = [
  "The generated .env ships a placeholder DATABASE_URL; the app builds without a live database but data routes need one.",
]
verify_build = "npm run build"
verify_dev = "npm run dev"
verify_url = "http://localhost:3000"

[[workflow.templates]]
id = "expo-mobile"
label = "Expo (React Native)"
stack = "Expo SDK, expo-router, TypeScript"
best_for = "iOS/Android mobile apps, with web preview during development"
requires = ["node", "npx", "git"]
scaffold = "npx --yes create-expo-app@latest {target}"
env = "No credentials needed to start. Add service keys later as the app grows (see https://docs.expo.dev/guides/environment-variables/)."
notes = [
  "Preview on a device with the Expo Go app, or in a simulator via the dev-server keyboard shortcuts.",
]
verify_build = ""
verify_dev = "npx expo start"
verify_url = "http://localhost:8081"

[[workflow.templates]]
id = "fastapi-fullstack"
label = "FastAPI + React"
stack = "FastAPI, SQLModel, Postgres, React + TypeScript + Vite, Docker Compose"
best_for = "Python backends with a React SPA frontend, API-first products"
requires = ["git", "docker"]
scaffold = "git clone --depth 1 https://github.com/fastapi/full-stack-fastapi-template.git {target}"
env = "Set SECRET_KEY, FIRST_SUPERUSER, and FIRST_SUPERUSER_PASSWORD in .env as the template README describes (https://github.com/fastapi/full-stack-fastapi-template)."
notes = [
  "docker compose up brings up the full stack; backend and frontend also run standalone per backend/README.md and frontend/README.md.",
]
verify_build = "docker compose config --quiet"
verify_dev = ""
verify_url = ""

[[workflow.templates]]
id = "astro-content"
label = "Astro content site"
stack = "Astro, content collections, official blog starter, zero-JS by default"
best_for = "Marketing sites, blogs, docs, and other content-first sites"
requires = ["node", "npm", "git"]
scaffold = "npm create astro@latest {target} -- --template blog --install --no-git --yes"
env = "No credentials needed."
notes = [
  "Replace the starter's sample posts in src/content/ with real content when planning lands.",
]
verify_build = "npm run build"
verify_dev = "npm run dev"
verify_url = "http://localhost:4321"
