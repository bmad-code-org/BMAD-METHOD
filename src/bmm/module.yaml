code: bmm
name: "BMad Method Agile-AI Driven-Development"
description: "AI-driven agile development framework"
default_selected: true # This module will be selected by default for new installations

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "What is your project called?"
  default: "{directory_name}"
  result: "{value}"

user_skill_level:
  prompt:
    - "What is your development experience level?"
    - "This affects how agents explain concepts in chat."
  default: "intermediate"
  result: "{value}"
  single-select:
    - value: "beginner"
      label: "Beginner - Explain things clearly"
    - value: "intermediate"
      label: "Intermediate - Balance detail with speed"
    - value: "expert"
      label: "Expert - Be direct and technical"

planning_artifacts: # Phase 1-3 artifacts
  prompt: "Where should planning artifacts be stored? (Brainstorming, Briefs, PRDs, UX Designs, Architecture, Epics)"
  default: "{output_folder}/planning-artifacts"
  result: "{project-root}/{value}"

implementation_artifacts: # Phase 4 artifacts and quick-dev flow output
  prompt: "Where should implementation artifacts be stored? (Sprint status, stories, reviews, retrospectives, Quick Flow output)"
  default: "{output_folder}/implementation-artifacts"
  result: "{project-root}/{value}"

project_knowledge: # Artifacts from research, document-project output, other long lived accurate knowledge
  prompt: "Where should long-term project knowledge be stored? (docs, research, references)"
  default: "docs"
  result: "{project-root}/{value}"

# Directories to create during installation (declarative, no code execution)
directories:
  - "{planning_artifacts}"
  - "{implementation_artifacts}"
  - "{project_knowledge}"

# --- Monorepo / Multi-Project Context Support ---
# IMPORTANT: When loading this config, apply monorepo context resolution BEFORE using any path variables.
#
# Resolution order:
# 1. INLINE OVERRIDE: Scan user's invocation for #project:NAME or #p:NAME (case-insensitive).
#    If found, set project_suffix = NAME.
# 2. FILE FALLBACK: If no inline override, check if {project-root}/_bmad/.current_project exists.
#    If so, read its single-line content as project_suffix (trim whitespace/newlines).
# 3. VALIDATE (if project_suffix is set):
#    - REJECT if empty, equals '.', contains '..', starts with '/' or drive letter (e.g. C:)
#    - REJECT if it contains '/' or '\' because project_suffix must be a single directory name
#    - REJECT if fails whitelist regex: ^[a-zA-Z0-9._-]+$
#    - On rejection: output "Security Error: Invalid project context" and HALT
# 4. OVERRIDE PATHS (if valid project_suffix):
#    - output_folder = {project-root}/_bmad-output/{project_suffix}
#    - planning_artifacts = {output_folder}/planning-artifacts
#    - implementation_artifacts = {output_folder}/implementation-artifacts
#    - project_knowledge = {output_folder}/knowledge
#    - sprint_status_file = {output_folder}/sprint-status.yaml
#    - project_name = {project_suffix}
# 5. If no project_suffix is set, use the default paths from config as-is.

monorepo_context:
  enabled: true
  context_file: ".current_project"
  inline_override_patterns:
    - "#project:"
    - "#p:"
  validation:
    whitelist_regex: "^[a-zA-Z0-9._-]+$"
    reject_traversal: true
    reject_absolute: true
